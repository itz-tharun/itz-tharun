<svg viewBox="0 0 1300 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Timeline: 2023-2027 Chennai Institute of Technology, May 2025 PICABORD Technologies, Aug-Oct 2025 TEEP Taiwan Research Internship, FLO Mobility industrial deployment, now Computer Vision Research and Graduate Studies Preparation">
  <style>
    :root { --bone: #444444; --muted: #888888; --dim: #AAAAAA; --rule: #C0C0C0; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --muted: #777777; --dim: #666666; --rule: #444444; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .axis { stroke: var(--rule); stroke-width: 1; stroke-dasharray: 1210; stroke-dashoffset: 1210; animation: draw 2.4s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .m { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .m1{animation-delay:.4s}.m2{animation-delay:.9s}.m3{animation-delay:1.4s}.m4{animation-delay:1.9s}.m5{animation-delay:2.4s}.m6{animation-delay:2.8s}
    .pulse { animation: pulse 2.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .ring { animation: ring 2.6s ease-out infinite; transform-origin: 1030px 130px; }
    @keyframes ring { 0%{transform:scale(.4);opacity:.8} 80%,100%{transform:scale(3);opacity:0} }
    @media (prefers-reduced-motion: reduce) {
      .axis,.m,.pulse,.ring { animation: none; } .axis{stroke-dashoffset:0} .m{opacity:1} .ring{opacity:0}
    }
      :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent: #000000; --node-bg: #FFFFFF; --core-bg: #FFFFFF; --ghost: #000000; }
  </style>

  <line class="axis" x1="48" y1="130" x2="1258" y2="130"/>

  <!-- 1: Academic Foundation -->
  <g class="m m1">
    <circle cx="110" cy="130" r="4" fill="var(--bone)"/>
    <line x1="110" y1="126" x2="110" y2="100" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="110" y="48" font-size="11" letter-spacing="2" text-anchor="middle">2023 – 2027</text>
    <text fill="var(--bone)" class="mono" x="110" y="64" font-size="10.5" letter-spacing="1" text-anchor="middle" font-weight="600">Academic Foundation</text>
    <text fill="var(--muted)" class="mono" x="110" y="80" font-size="9" letter-spacing=".5" text-anchor="middle">Chennai Institute of Technology</text>
    <text fill="var(--dim)" class="mono" x="110" y="94" font-size="8.3" letter-spacing=".3" text-anchor="middle">Electronics &amp; Communication Eng.</text>
  </g>

  <!-- 2: Engineering Leadership -->
  <g class="m m2">
    <circle cx="345" cy="130" r="4" fill="var(--bone)"/>
    <line x1="345" y1="134" x2="345" y2="160" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="345" y="178" font-size="11" letter-spacing="2" text-anchor="middle">MAY 2025 - ONGOING</text>
    <text fill="var(--bone)" class="mono" x="345" y="194" font-size="10.5" letter-spacing="1" text-anchor="middle" font-weight="600">Engineering Leadership</text>
    <text fill="var(--muted)" class="mono" x="345" y="208" font-size="9" letter-spacing=".5" text-anchor="middle">PICABORD Technologies</text>
    <text fill="var(--dim)" class="mono" x="345" y="222" font-size="8.3" letter-spacing=".3" text-anchor="middle">Embedded hardware &amp; robotics platforms</text>
  </g>

  <!-- 3: International Research -->
  <g class="m m3">
    <circle cx="600" cy="130" r="4" fill="var(--bone)"/>
    <line x1="600" y1="126" x2="600" y2="100" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="600" y="48" font-size="11" letter-spacing="2" text-anchor="middle">AUG – OCT 2025</text>
    <text fill="var(--bone)" class="mono" x="600" y="64" font-size="10.5" letter-spacing="1" text-anchor="middle" font-weight="600">International Research</text>
    <text fill="var(--muted)" class="mono" x="600" y="80" font-size="9" letter-spacing=".5" text-anchor="middle">TEEP Taiwan Research Internship</text>
    <text fill="var(--dim)" class="mono" x="600" y="94" font-size="8.3" letter-spacing=".3" text-anchor="middle">Computer vision &amp; textile automation</text>
  </g>

  <!-- 4: Industrial Deployment -->
  <g class="m m4">
    <circle cx="845" cy="130" r="4" fill="var(--bone)"/>
    <line x1="845" y1="134" x2="845" y2="160" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="845" y="178" font-size="11" letter-spacing="2" text-anchor="middle">MAY -JULY 2026</text>
    <text fill="var(--bone)" class="mono" x="845" y="194" font-size="10.5" letter-spacing="1" text-anchor="middle" font-weight="600">Industrial Deployment</text>
    <text fill="var(--muted)" class="mono" x="845" y="208" font-size="9" letter-spacing=".5" text-anchor="middle">FLO Mobility</text>
    <text fill="var(--dim)" class="mono" x="845" y="222" font-size="8.3" letter-spacing=".3" text-anchor="middle">Autonomous mobile robots · field eng.</text>
  </g>

  <!-- 5: Research & Future Direction (NOW) -->
  <g class="m m5">
    <circle class="ring" cx="1030" cy="130" r="4" stroke="var(--accent)" fill="none"/>
    <circle class="pulse" cx="1030" cy="130" r="4.5" fill="var(--accent)"/>
    <line x1="1030" y1="126" x2="1030" y2="100" stroke="var(--rule)"/>
    <text fill="var(--accent)" class="mono" x="1030" y="48" font-size="11" letter-spacing="2" text-anchor="middle">NOW</text>
    <text fill="var(--bone)" class="mono" x="1030" y="64" font-size="10.5" letter-spacing="1" text-anchor="middle" font-weight="600">Research &amp; Future Direction</text>
    <text fill="var(--muted)" class="mono" x="1030" y="80" font-size="9" letter-spacing=".5" text-anchor="middle">Computer Vision Research</text>
    <text fill="var(--dim)" class="mono" x="1030" y="94" font-size="8.3" letter-spacing=".3" text-anchor="middle">Preparing publications · grad studies</text>
  </g>

  <g class="m m6">
    <circle cx="1252" cy="130" r="3" fill="var(--dim)"/>
    <text fill="var(--dim)" class="mono" x="1252" y="150" font-size="10" letter-spacing="2" text-anchor="end">→</text>
    <text fill="var(--dim)" class="mono" x="1252" y="178" font-size="12" text-anchor="end">robotics &amp; autonomous systems</text>
  </g>
</svg>
