<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'IBM Plex Sans', 'SF Pro Display', -apple-system, sans-serif">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <style>
    :root {
      --card-bg: #141820;
      --mini-bg: #191E27;
      --border: #262B35;
      --text-primary: #E6EDF3;
      --text-secondary: #94A3B8;
      --accent: #2DD4BF;
    }
    .card { fill: var(--card-bg); stroke: var(--border); stroke-width: 1.5; filter: url(#softShadow); }
    .mini { fill: var(--mini-bg); stroke: var(--border); stroke-width: 1.25; }
    .step-num { fill: var(--card-bg); stroke: var(--accent); stroke-width: 1.5; }
    .step-num-text { font-size: 13px; font-weight: 700; fill: var(--accent); text-anchor: middle; dominant-baseline: central; }
    .divider { stroke: var(--border); stroke-width: 1; }
    .card-title { font-size: 21px; font-weight: 700; letter-spacing: 0.3px; fill: var(--text-primary); }
    .card-desc { font-size: 15px; fill: var(--text-secondary); }
    .mini-title { font-size: 14.5px; font-weight: 600; fill: var(--text-primary); }
    .mini-item { font-size: 12px; fill: var(--text-secondary); }
    .icon { stroke: var(--accent); stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .badge-bg { fill: var(--accent); opacity: 0.12; }
    .arrowhead { fill: var(--accent); }

    .flow-line {
      stroke: var(--accent);
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 8 8;
      stroke-linecap: round;
      animation: dashmove 1.6s linear infinite;
    }
    @keyframes dashmove { to { stroke-dashoffset: -32; } }

    .stage { opacity: 0; animation: fadeInUp 1s ease-out forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stage-1 { animation-delay: 0s; }
    .stage-2 { animation-delay: 0.9s; }
    .stage-3 { animation-delay: 1.8s; }
    .stage-4 { animation-delay: 2.7s; }
  </style>

  <!-- STAGE 1: Understand the System -->
  <g class="stage stage-1">
    <rect class="card" x="250" y="20" width="700" height="90" rx="18"/>
    <circle class="step-num" cx="912" cy="42" r="15"/>
    <text class="step-num-text" x="912" y="43">1</text>
    <circle class="badge-bg" cx="310" cy="65" r="24"/>
    <g class="icon" transform="translate(310,65)">
      <path d="M -8 -6 L 0 -10 L 8 -6 L 0 -2 Z"/>
      <path d="M -8 1 L 0 5 L 8 1"/>
      <path d="M -8 6 L 0 10 L 8 6"/>
    </g>
    <text class="card-title" x="360" y="58">UNDERSTAND THE SYSTEM</text>
    <text class="card-desc" x="360" y="82">Study the complete system before proposing any technical solution.</text>
  </g>

  <!-- Arrow 1 -->
  <g class="stage stage-2">
    <line class="flow-line" x1="600" y1="110" x2="600" y2="146"/>
    <path class="arrowhead" d="M 593 136 L 607 136 L 600 145 Z"/>
  </g>

  <!-- STAGE 2: Identify the Bottleneck -->
  <g class="stage stage-2">
    <rect class="card" x="250" y="146" width="700" height="90" rx="18"/>
    <circle class="step-num" cx="912" cy="168" r="15"/>
    <text class="step-num-text" x="912" y="169">2</text>
    <circle class="badge-bg" cx="310" cy="191" r="24"/>
    <g class="icon" transform="translate(310,191)">
      <circle cx="-2" cy="-2" r="7"/>
      <line x1="3" y1="3" x2="9" y2="9"/>
    </g>
    <text class="card-title" x="360" y="184">IDENTIFY THE BOTTLENECK</text>
    <text class="card-desc" x="360" y="208">Find the highest-impact limitation instead of optimizing components.</text>
  </g>

  <!-- Arrow 2 (fixed: now ends at the Build card's actual top edge, y=260) -->
  <g class="stage stage-3">
    <line class="flow-line" x1="600" y1="236" x2="600" y2="260"/>
    <path class="arrowhead" d="M 593 250 L 607 250 L 600 259 Z"/>
  </g>

  <!-- STAGE 3: Build the Right System (with nested sub-blocks) -->
  <g class="stage stage-3">
    <rect class="card" x="250" y="260" width="700" height="270" rx="18"/>
    <circle class="step-num" cx="912" cy="282" r="15"/>
    <text class="step-num-text" x="912" y="283">3</text>
    <circle class="badge-bg" cx="310" cy="305" r="24"/>
    <g class="icon" transform="translate(310,305)">
      <rect x="-9" y="-9" width="18" height="18" rx="2"/>
      <line x1="-9" y1="0" x2="9" y2="0"/>
      <line x1="0" y1="-9" x2="0" y2="9"/>
    </g>
    <text class="card-title" x="360" y="298">BUILD THE RIGHT SYSTEM</text>
    <text class="card-desc" x="360" y="322">Assemble perception, intelligence, and actuation into one coherent system.</text>

    <line class="divider" x1="280" y1="352" x2="920" y2="352"/>

    <!-- Perception -->
    <rect class="mini" x="280" y="370" width="196" height="140" rx="12"/>
    <circle class="badge-bg" cx="312" cy="405" r="15"/>
    <g class="icon" transform="translate(312,405)">
      <path d="M -10 0 C -10 -6 -4 -9 0 -9 C 4 -9 10 -6 10 0 C 10 6 4 9 0 9 C -4 9 -10 6 -10 0 Z"/>
      <circle r="3"/>
    </g>
    <text class="mini-title" x="340" y="410">Perception</text>
    <text class="mini-item" x="298" y="438">Computer Vision</text>
    <text class="mini-item" x="298" y="461">Sensors</text>
    <text class="mini-item" x="298" y="484">Localization</text>

    <!-- Intelligence -->
    <rect class="mini" x="502" y="370" width="196" height="140" rx="12"/>
    <circle class="badge-bg" cx="534" cy="405" r="15"/>
    <g class="icon" transform="translate(534,405)">
      <rect x="-6" y="-6" width="12" height="12" rx="2"/>
      <line x1="-6" y1="-2.5" x2="-9" y2="-2.5"/>
      <line x1="-6" y1="2.5" x2="-9" y2="2.5"/>
      <line x1="6" y1="-2.5" x2="9" y2="-2.5"/>
      <line x1="6" y1="2.5" x2="9" y2="2.5"/>
      <line x1="-2.5" y1="-6" x2="-2.5" y2="-9"/>
      <line x1="2.5" y1="-6" x2="2.5" y2="-9"/>
      <line x1="-2.5" y1="6" x2="-2.5" y2="9"/>
      <line x1="2.5" y1="6" x2="2.5" y2="9"/>
    </g>
    <text class="mini-title" x="562" y="410">Intelligence</text>
    <text class="mini-item" x="518" y="438">Planning</text>
    <text class="mini-item" x="518" y="461">Control</text>
    <text class="mini-item" x="518" y="484">System Integration</text>

    <!-- Actuation -->
    <rect class="mini" x="724" y="370" width="196" height="140" rx="12"/>
    <circle class="badge-bg" cx="756" cy="405" r="15"/>
    <g class="icon" transform="translate(756,405)">
      <circle r="6"/>
      <line x1="0" y1="-6" x2="0" y2="-10"/>
      <line x1="0" y1="-6" x2="0" y2="-10" transform="rotate(45)"/>
      <line x1="0" y1="-6" x2="0" y2="-10" transform="rotate(90)"/>
      <line x1="0" y1="-6" x2="0" y2="-10" transform="rotate(135)"/>
      <line x1="0" y1="-6" x2="0" y2="-10" transform="rotate(180)"/>
      <line x1="0" y1="-6" x2="0" y2="-10" transform="rotate(225)"/>
      <line x1="0" y1="-6" x2="0" y2="-10" transform="rotate(270)"/>
      <line x1="0" y1="-6" x2="0" y2="-10" transform="rotate(315)"/>
    </g>
    <text class="mini-title" x="784" y="410">Actuation</text>
    <text class="mini-item" x="740" y="438">Embedded Systems</text>
    <text class="mini-item" x="740" y="461">Robotics</text>
    <text class="mini-item" x="740" y="484">Industrial Automation</text>
  </g>

  <!-- Arrow 3 -->
  <g class="stage stage-4">
    <line class="flow-line" x1="600" y1="530" x2="600" y2="566"/>
    <path class="arrowhead" d="M 593 556 L 607 556 L 600 565 Z"/>
  </g>

  <!-- STAGE 4: Validate, Iterate, Deploy -->
  <g class="stage stage-4">
    <rect class="card" x="250" y="566" width="700" height="90" rx="18"/>
    <circle class="step-num" cx="912" cy="588" r="15"/>
    <text class="step-num-text" x="912" y="589">4</text>
    <circle class="badge-bg" cx="310" cy="611" r="24"/>
    <g class="icon" transform="translate(310,611)">
      <path d="M 0 -10 C 4 -7 6 -2 5 4 L -5 4 C -6 -2 -4 -7 0 -10 Z"/>
      <circle cx="0" cy="-3" r="2"/>
      <path d="M -5 4 L -8 9 L -3 7 Z"/>
      <path d="M 5 4 L 8 9 L 3 7 Z"/>
    </g>
    <text class="card-title" x="360" y="604">VALIDATE &#8226; ITERATE &#8226; DEPLOY</text>
    <text class="card-desc" x="360" y="628">Prototype, test, improve, and continuously refine based on real-world feedback.</text>
  </g>
</svg>
